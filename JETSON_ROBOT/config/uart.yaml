# ========================================
# UART 통신 설정
# ========================================
uart:
  # Arduino가 연결된 포트
  port: "/dev/ttyACM0"

  # UART 통신 속도 (Jetson과 Arduino가 동일해야 함)
  baudrate: 115200

  # 응답 대기 시간(초)
  timeout: 1

# ========================================
# 통신 프로토콜
# ========================================
protocol:
  # 문자열 인코딩 방식
  encoding: "utf-8"

  # 한 줄의 끝을 나타내는 문자
  newline: "\n"

# ========================================
# Jetson → Arduino 명령어
# ========================================
commands:
  move: "MOVE"      # 이동 명령
  stop: "STOP"      # 긴급 정지
  home: "HOME"      # 원점 복귀
  qr_scan: "QR_SCAN" # QR 코드 스캔
  detect: "DETECT"   # 물체 인식

# ========================================
# Arduino → Jetson 응답 코드
# ========================================
responses:
  ok: "OK"          # 명령 수신 완료
  busy: "BUSY"      # 작업 중
  done: "DONE"      # 작업 완료
  error: "ERROR"    # 오류 발생

# ========================================
# 재시도 정책
# ========================================
retry:
  max_retry: 3          # 최대 재시도 횟수
  retry_interval: 1     # 재시도 간격(초)