<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Greenhouse Admin</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, Arial, sans-serif; background: #05070d; color: #edf7ff; --panel: rgba(13,20,33,.88); --line: rgba(126,232,255,.16); --muted: #8292a7; --cyan:#35d5ff; --green:#48f2a6; --red:#ff5d73; --amber:#ffbf47; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: radial-gradient(circle at 0 0, rgba(53,213,255,.17), transparent 32%), linear-gradient(135deg,#030409,#07101c 52%,#05070d); }
    .page { width: min(1920px, 100vw); min-height: min(1080px, 100vh); margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 280px 1fr; gap: 18px; }
    .glass { background: linear-gradient(145deg, rgba(16,27,43,.90), rgba(8,13,23,.80)); border: 1px solid var(--line); border-radius: 18px; box-shadow: 0 24px 80px rgba(0,0,0,.34); }
    aside { padding: 22px; display: flex; flex-direction: column; gap: 18px; }
    h1,h2,h3,p { margin-top: 0; } h1 { font-size: 28px; } h2 { font-size: 17px; } p, .muted { color: var(--muted); }
    a, button { font: inherit; } a { color: #dbeaff; text-decoration: none; padding: 12px 14px; border-radius: 12px; } a.active, a:hover { background: rgba(53,213,255,.10); color: white; }
    main { display: grid; grid-template-rows: auto 1fr; gap: 18px; min-width: 0; }
    .top { padding: 22px; display: flex; justify-content: space-between; align-items: center; }
    .grid { display: grid; grid-template-columns: 1.2fr .8fr; gap: 18px; min-height: 0; }
    .panel { padding: 18px; min-height: 0; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 13px 12px; border-bottom: 1px solid rgba(255,255,255,.08); }
    th { color: #9fb1c7; font-size: 12px; font-weight: 700; }
    .btn { border: 1px solid rgba(53,213,255,.24); border-radius: 11px; background: rgba(53,213,255,.10); color: white; padding: 9px 12px; cursor: pointer; }
    .btn.good { background: linear-gradient(135deg,#1aa5ff,#45efaa); color:#031016; border:0; font-weight:800; }
    .btn.bad { border-color: rgba(255,93,115,.28); background: rgba(255,93,115,.10); }
    .queue { display: grid; gap: 12px; max-height: 760px; overflow: auto; padding-right: 4px; }
    .alert { padding: 15px; border-radius: 15px; border: 1px solid rgba(255,93,115,.22); background: rgba(255,93,115,.08); }
    .alert.warning { border-color: rgba(255,191,71,.22); background: rgba(255,191,71,.08); }
    .alert strong { display: block; margin-bottom: 6px; }
    .kpis { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-top: 16px; }
    .kpi { padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.04); }
    .kpi strong { display:block; font-size: 24px; margin-top: 6px; }
    .split-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    @media (max-width: 1000px) { .page,.grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="page">
    <aside class="glass"><h2>ADMIN CONTROL</h2><a href="/">Dashboard</a><a class="active" href="/admin">Alert Review</a><a href="/api/approvals">Approvals API</a><p class="muted">문제 셀, AI 위험도, 관리자 승인 대기 항목을 한 화면에서 검토합니다.</p></aside>
    <main>
      <header class="top glass"><div><h1>관리자 검토 페이지</h1><p id="updated" class="muted">Loading</p></div><button class="btn" onclick="loadAdmin()">Refresh</button></header>
      <section class="grid">
        <div class="panel glass"><h2>승인 대기 작업</h2><table><thead><tr><th>ID</th><th>Cell</th><th>AI</th><th>Risk</th><th>Message</th><th>Action</th></tr></thead><tbody id="approvalRows"></tbody></table></div>
        <div class="panel glass"><h2>알람 이벤트 검토</h2><div class="queue" id="alertQueue"></div></div>
      </section>
    </main>
  </div>
  <script>
    async function approve(id) { await fetch(`/api/approval/${id}/approve`, { method: 'POST' }); await loadAdmin(); }
    async function rejectApproval(id) { await fetch(`/api/approval/${id}/reject`, { method: 'POST' }); await loadAdmin(); }
    function alertsFrom(data) {
      const out = [];
      data.panels.forEach((p) => { if (p.status !== 'normal') out.push({ level: p.status, title: `${p.cellName} ${p.riskLevel}`, body: `${p.diseaseName} ${p.diseaseProbability}% · ${p.envWarning} · Robot ${p.stateMachine}` }); });
      data.events.filter(e => /AI_DANGER|WARNING|SENSOR/.test(e.event_type + e.message)).forEach((e) => out.push({ level: 'warning', title: `${e.event_type}`, body: `${e.event_time} · ${e.message}` }));
      return out;
    }
    async function loadAdmin() {
      const data = await (await fetch('/api/dashboard')).json();
      document.getElementById('updated').textContent = `Updated ${new Date(data.generatedAt).toLocaleString()}`;
      document.getElementById('approvalRows').innerHTML = data.pendingApprovals.length ? data.pendingApprovals.map((a) => `<tr><td>${a.id}</td><td>${a.cell_id}</td><td>${a.ai_mode}</td><td>${a.disease_probability}%</td><td>${a.review_message}</td><td><div class="split-actions"><button class="btn good" onclick="approve(${a.id})">Approve</button><button class="btn bad" onclick="rejectApproval(${a.id})">Reject</button></div></td></tr>`).join('') : '<tr><td colspan="6">승인 대기 항목이 없습니다.</td></tr>';
      const alerts = alertsFrom(data);
      document.getElementById('alertQueue').innerHTML = alerts.length ? alerts.map((a) => `<article class="alert ${a.level}"><strong>${a.title}</strong><p>${a.body}</p><button class="btn">Reviewed</button></article>`).join('') : '<article class="alert warning"><strong>정상</strong><p>검토할 알람 이벤트가 없습니다.</p></article>';
    }
    loadAdmin();
  </script>
</body>
</html>
