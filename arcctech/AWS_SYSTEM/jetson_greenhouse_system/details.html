<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Greenhouse Details</title><style>
:root{color-scheme:dark;font-family:Inter,Arial,sans-serif;background:#05070d;color:#edf7ff;--line:rgba(126,232,255,.16);--muted:#8494a8;--cyan:#35d5ff;--red:#ff5d73}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 0 0,rgba(53,213,255,.16),transparent 30%),linear-gradient(135deg,#030409,#07101c,#05070d)}.page{width:min(1920px,100vw);min-height:min(1080px,100vh);margin:0 auto;padding:22px;display:grid;grid-template-columns:230px 1fr;gap:18px}.glass{background:linear-gradient(145deg,rgba(16,27,43,.9),rgba(8,13,23,.82));border:1px solid var(--line);border-radius:18px;box-shadow:0 24px 80px rgba(0,0,0,.34)}aside{padding:20px;display:flex;flex-direction:column;gap:10px}a{color:#d7e6f6;text-decoration:none;padding:12px 13px;border-radius:12px}a.active,a:hover{background:rgba(53,213,255,.1)}main{display:grid;grid-template-rows:auto auto 1fr;gap:18px;min-width:0}.top{padding:20px;display:flex;justify-content:space-between;align-items:center}h1,h2{margin:0}.muted{color:var(--muted);font-size:12px}.tabs{display:flex;gap:8px;padding:12px}.tab{border:1px solid rgba(53,213,255,.22);background:rgba(53,213,255,.08);color:white;border-radius:11px;padding:9px 12px;cursor:pointer}.tab.active{background:linear-gradient(135deg,#1aa5ff,#45efaa);color:#031016;font-weight:800}.panel{padding:18px;overflow:auto;max-height:760px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;padding:10px;border-bottom:1px solid rgba(255,255,255,.08);white-space:nowrap}th{color:#9fb1c7;font-size:12px}.api{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{padding:14px;border:1px solid rgba(255,255,255,.08);border-radius:14px;background:rgba(255,255,255,.04)}code{color:var(--cyan)}@media(max-width:1000px){.page{grid-template-columns:1fr}.api{grid-template-columns:1fr}}
</style></head><body><div class="page"><aside class="glass"><h2>DETAILS</h2><a href="/">Main</a><a class="active" href="/details">Details</a><a href="/admin">Admin</a><a href="/api/details">Details API</a></aside><main><header class="top glass"><div><h1>상세 로그 / 상태 페이지</h1><div id="updated" class="muted">Loading</div></div><button class="tab" onclick="loadDetails()">Refresh</button></header><section class="api"><div class="card"><strong>AI Mode</strong><p id="ai" class="muted"></p></div><div class="card"><strong>Sensor Logs</strong><p id="sensorCount" class="muted"></p></div><div class="card"><strong>AI Readings</strong><p id="aiCount" class="muted"></p></div><div class="card"><strong>Robot Tasks</strong><p id="taskCount" class="muted"></p></div></section><section class="glass"><div class="tabs"><button class="tab active" data-tab="sensorLogs">Sensor</button><button class="tab" data-tab="aiReadings">AI</button><button class="tab" data-tab="tasks">Robot Tasks</button><button class="tab" data-tab="feedback">Feedback</button><button class="tab" data-tab="events">Events</button><button class="tab" data-tab="thresholds">Thresholds</button></div><div class="panel"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div></section></main></div><script>
let detailData=null, active='sensorLogs'; const cols={sensorLogs:['id','cell_name','measured_at','temperature','humidity','sap_amount_ml','growth_rate','env_warning'],aiReadings:['id','cell_name','detected_at','ai_mode','disease_area','disease_name','disease_probability','risk_level','recommended_task'],tasks:['id','cell_name','task_name','control_state','state_machine','progress_rate','robot_status','created_at'],feedback:['id','cell_name','task_id','reported_at','progress_rate','temperature','humidity','sap_amount_ml','robot_status'],events:['id','event_time','event_type','cell_id','message'],thresholds:['metric','min_value','max_value','unit','enabled','description']};
function renderTable(){const rows=detailData[active]||[], c=cols[active];document.getElementById('thead').innerHTML='<tr>'+c.map(v=>`<th>${v}</th>`).join('')+'</tr>';document.getElementById('tbody').innerHTML=rows.map(r=>'<tr>'+c.map(v=>`<td>${r[v]??''}</td>`).join('')+'</tr>').join('')||`<tr><td colspan="${c.length}">No data</td></tr>`}
async function loadDetails(){detailData=await(await fetch('/api/details')).json();document.getElementById('updated').textContent=`Updated ${new Date(detailData.generatedAt).toLocaleString()}`;document.getElementById('ai').textContent=detailData.aiMode.enabled?'ON':'OFF';document.getElementById('sensorCount').textContent=detailData.sensorLogs.length;document.getElementById('aiCount').textContent=detailData.aiReadings.length;document.getElementById('taskCount').textContent=detailData.tasks.length;renderTable()}
document.querySelectorAll('.tab[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab[data-tab]').forEach(x=>x.classList.remove('active'));b.classList.add('active');active=b.dataset.tab;renderTable()});loadDetails();setInterval(loadDetails,10000);
</script></body></html>
