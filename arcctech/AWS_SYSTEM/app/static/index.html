<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>STREW Robot Dashboard</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#f6f8fb;color:#172033}header{background:#1f6feb;color:white;padding:18px 24px}main{max-width:1100px;margin:24px auto;padding:0 16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.panel{background:white;border:1px solid #d8dee8;border-radius:8px;padding:16px}label{display:block;font-size:13px;margin-top:10px}input,select{width:100%;box-sizing:border-box;padding:9px;border:1px solid #c8d0dc;border-radius:6px}button{margin-top:12px;background:#1f6feb;color:white;border:0;border-radius:6px;padding:10px 14px;cursor:pointer}pre{white-space:pre-wrap;background:#0d1117;color:#d6deeb;padding:12px;border-radius:6px;min-height:180px}@media(max-width:800px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><h1>STREW Vision Robot</h1></header>
<main>
  <div class="grid">
    <section class="panel">
      <h2>Robot Request</h2>
      <label>API Key<input id="apiKey" type="password" value="change-me"></label>
      <label>Robot ID<input id="robotId" value="robot-01"></label>
      <label>Task<input id="task" value="PICK_BY_VISION"></label>
      <label>Move Sign<select id="move"><option>STOP</option><option>LEFT</option><option>RIGHT</option><option>FORWARD</option><option>BACKWARD</option></select></label>
      <label>Target Label<input id="label" value="box"></label>
      <button onclick="sendTask()">Send</button>
    </section>
    <section class="panel">
      <h2>Latest Tasks</h2>
      <button onclick="loadTasks()">Refresh</button>
      <pre id="output"></pre>
    </section>
  </div>
</main>
<script>
async function api(path, options={}){options.headers={"Content-Type":"application/json","X-API-Key":document.getElementById('apiKey').value,...(options.headers||{})};const r=await fetch(path,options);return await r.json();}
async function sendTask(){const body={robot_id:robotId.value,execute_task:task.value,move_sign:move.value,target_label:label.value,payload:{from:"dashboard"}};output.textContent=JSON.stringify(await api('/robot/request',{method:'POST',body:JSON.stringify(body)}),null,2);}
async function loadTasks(){output.textContent=JSON.stringify(await api('/robot/tasks?limit=20'),null,2);}
loadTasks();
</script>
</body>
</html>
